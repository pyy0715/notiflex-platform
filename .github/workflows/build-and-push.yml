name: Build and push notiflex-api image

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "scripts/image-build.sh"
      - "scripts/image-push.sh"
      - "VERSION"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Run tests
        working-directory: app
        run: go test ./...

      - name: Determine image tag
        id: build
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: ./scripts/image-push.sh

      - name: Update manifest image tag
        run: |
          sed -i "s|image: .*notiflex-api:.*|image: us-central1-docker.pkg.dev/bubbly-subject-501015-t9/containers/notiflex-api:${{ steps.build.outputs.sha }}|" \
            k8s/smb/deployment.yaml

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push manifest
        run: |
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "ci: update image tag to ${{ steps.build.outputs.sha }}"
          git push

      - name: Summary
        run: |
          echo "### Image pushed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`us-central1-docker.pkg.dev/bubbly-subject-501015-t9/containers/notiflex-api:${{ steps.build.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
