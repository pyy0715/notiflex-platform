name: Build and push notiflex-api image

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "VERSION"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch: {}

env:
  REGISTRY: us-central1-docker.pkg.dev/bubbly-subject-501015-t9/containers
  IMAGE_NAME: notiflex-api

permissions:
  contents: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: build
        run: |
          echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Authenticate Docker to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.build.outputs.version }}
            COMMIT=${{ steps.build.outputs.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Update manifest image tag
        run: |
          sed -i "s|image: .*${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.sha }}|" \
            k8s/api/rollout.yaml

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push manifest
        run: |
          git add k8s/api/rollout.yaml
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "ci: update image tag to ${{ steps.build.outputs.sha }}"
          git push

      - name: Summary
        run: |
          echo "### Image pushed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
