apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notiflex-api
  namespace: notiflex
  labels:
    app.kubernetes.io/name: notiflex-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notiflex-api
      app.kubernetes.io/component: api
  strategy:
    blueGreen:
      activeService: notiflex-api
      previewService: notiflex-api-preview
      autoPromotionEnabled: true
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notiflex-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: notiflex-api
          image: us-central1-docker.pkg.dev/bubbly-subject-501015-t9/containers/notiflex-api:38209e8
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
