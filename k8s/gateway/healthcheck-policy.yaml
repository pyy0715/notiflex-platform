apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: notiflex-api-healthcheck
  namespace: notiflex
  labels:
    app.kubernetes.io/name: notiflex-api-healthcheck
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: notiflex
spec:
  default:
    # deployment.yaml 의 readiness/livenessProbe 와 동일한 /health 경로로 체크.
    # GKE HealthCheckPolicy는 2xx 응답을 기본 healthy로 판정하므로 상태코드 명시 불필요.
    checkIntervalSec: 5
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
        portSpecification: USE_SERVING_PORT   # Service의 targetPort(8080) 사용
  targetRef:
    group: ""
    kind: Service
    name: notiflex-api
