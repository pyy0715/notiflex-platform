apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: notiflex-gateway
  namespace: notiflex
  labels:
    app.kubernetes.io/name: notiflex-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: notiflex
  annotations:
    # 리저널 LB는 region 명시가 필수 — 이 클러스터는 us-central1
    networking.gke.io/region: us-central1
spec:
  gatewayClassName: gke-l7-regional-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same  # 같은 namespace(notiflex)의 HTTPRoute만 부착 허용
